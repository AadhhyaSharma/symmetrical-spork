name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller numpy

      - name: Build EXE
        run: |
          pyinstaller --onefile --name physics_engine physics_engine.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: physics_engine_windows
          path: dist/physics_engine.exe
          retention-days: 30